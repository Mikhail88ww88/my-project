<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Михаил — ИИ специалист</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg-top: #eef2ff;
      --bg-bot: #fdf4ff;
      --card:   #ffffff;
      --accent1: #7c3aed;
      --accent2: #06b6d4;
      --accent3: #a855f7;
      --text:   #1e1b4b;
      --muted:  #6b7280;
      --border: rgba(124,58,237,0.15);
    }

    html, body { height: 100%; }

    body {
      background: linear-gradient(145deg, var(--bg-top) 0%, #f5f3ff 40%, var(--bg-bot) 100%);
      color: var(--text);
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* Soft blobs */
    body::before, body::after {
      content: '';
      position: fixed;
      border-radius: 50%;
      filter: blur(80px);
      pointer-events: none;
      z-index: 0;
    }
    body::before {
      width: 500px; height: 500px;
      top: -120px; left: -120px;
      background: rgba(124,58,237,0.10);
    }
    body::after {
      width: 400px; height: 400px;
      bottom: -100px; right: -100px;
      background: rgba(6,182,212,0.10);
    }

    /* Card */
    .card {
      position: relative;
      z-index: 1;
      width: min(420px, 92vw);
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 28px;
      padding: 48px 40px 40px;
      text-align: center;
      box-shadow:
        0 0 0 1px rgba(255,255,255,0.9) inset,
        0 20px 60px rgba(124,58,237,0.12),
        0 4px 16px rgba(0,0,0,0.06);
      animation: cardIn 0.65s cubic-bezier(0.22,1,0.36,1) both;
      backdrop-filter: blur(10px);
    }

    @keyframes cardIn {
      from { opacity: 0; transform: translateY(28px) scale(0.97); }
      to   { opacity: 1; transform: translateY(0)    scale(1); }
    }

    /* Top accent line */
    .card::before {
      content: '';
      position: absolute;
      top: 0; left: 50%;
      transform: translateX(-50%);
      width: 55%;
      height: 3px;
      background: linear-gradient(90deg, transparent, var(--accent1), var(--accent2), transparent);
      border-radius: 0 0 8px 8px;
    }

    /* Avatar */
    .avatar-wrap {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 24px;
      position: relative;
      width: 110px;
      height: 110px;
    }

    .avatar-ring {
      position: absolute;
      inset: -3px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--accent1), var(--accent2), var(--accent3));
      padding: 3px;
      animation: spin 7s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .avatar-ring-inner {
      width: 100%;
      height: 100%;
      border-radius: 50%;
      background: #fff;
    }

    .avatar-img {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      border-radius: 50%;
      object-fit: cover;
      object-position: center top;
      z-index: 1;
      border: 3px solid #fff;
    }

    /* Name */
    .name {
      font-size: clamp(30px, 8vw, 38px);
      font-weight: 800;
      letter-spacing: -0.8px;
      line-height: 1.1;
      margin-bottom: 10px;
      background: linear-gradient(135deg, var(--accent1) 0%, #9333ea 50%, var(--accent2) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      filter: drop-shadow(0 2px 12px rgba(124,58,237,0.20));
      animation: namePulse 5s ease-in-out infinite;
    }

    @keyframes namePulse {
      0%, 100% { filter: drop-shadow(0 2px 10px rgba(124,58,237,0.18)); }
      50%       { filter: drop-shadow(0 2px 20px rgba(124,58,237,0.38)); }
    }

    /* Role badge */
    .role {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      background: linear-gradient(135deg, rgba(124,58,237,0.08), rgba(6,182,212,0.08));
      border: 1px solid rgba(124,58,237,0.2);
      border-radius: 100px;
      padding: 6px 16px;
      font-size: 13px;
      font-weight: 600;
      color: var(--accent1);
      margin-bottom: 30px;
    }

    .role-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--accent2);
      animation: blink 2.2s ease-in-out infinite;
      flex-shrink: 0;
    }

    @keyframes blink {
      0%, 100% { opacity: 1; transform: scale(1); }
      50%       { opacity: 0.3; transform: scale(0.6); }
    }

    /* Divider */
    .divider {
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(124,58,237,0.15), transparent);
      margin: 0 0 28px;
    }

    /* Telegram block */
    .tg-block {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      margin-bottom: 28px;
      padding: 12px 20px;
      background: rgba(33,150,243,0.06);
      border: 1px solid rgba(33,150,243,0.2);
      border-radius: 14px;
      text-decoration: none;
      color: #1565c0;
      font-size: 14px;
      font-weight: 500;
      transition: all 0.2s;
    }

    .tg-block:hover {
      background: rgba(33,150,243,0.12);
      border-color: rgba(33,150,243,0.4);
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(33,150,243,0.15);
    }

    .tg-block svg {
      width: 22px; height: 22px;
      flex-shrink: 0;
      color: #1e88e5;
    }

    .tg-handle {
      font-weight: 700;
      color: #1565c0;
    }

    /* CTA */
    .cta {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      width: 100%;
      padding: 15px 28px;
      border-radius: 14px;
      font-size: 15px;
      font-weight: 700;
      text-decoration: none;
      color: #fff;
      background: linear-gradient(135deg, var(--accent1) 0%, #9333ea 50%, var(--accent2) 100%);
      background-size: 200% 200%;
      border: none;
      cursor: pointer;
      position: relative;
      overflow: hidden;
      transition: transform 0.2s, box-shadow 0.2s;
      animation: gradMove 4s ease infinite;
      box-shadow: 0 4px 20px rgba(124,58,237,0.3);
      letter-spacing: 0.3px;
    }

    @keyframes gradMove {
      0%   { background-position: 0% 50%; }
      50%  { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    .cta::before {
      content: '';
      position: absolute;
      top: 0; left: -100%;
      width: 60%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
      transform: skewX(-20deg);
      transition: left 0.55s;
    }

    .cta:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 32px rgba(124,58,237,0.4);
    }

    .cta:hover::before { left: 160%; }
    .cta:active { transform: translateY(0) scale(0.98); }

    .cta svg { width: 18px; height: 18px; flex-shrink: 0; }

    /* Footer */
    .card-footer {
      margin-top: 18px;
      font-size: 12px;
      color: rgba(107,114,128,0.6);
      letter-spacing: 0.3px;
    }

    @media (max-width: 480px) {
      .card { padding: 36px 20px 28px; }
    }
  </style>
</head>
<body>

  <script>
    // Subtle 3D tilt on mouse move
    const card = document.querySelector('.card');
    document.addEventListener('mousemove', e => {
      const r = card.getBoundingClientRect();
      const cx = r.left + r.width / 2;
      const cy = r.top + r.height / 2;
      const dx = (e.clientX - cx) / (window.innerWidth / 2);
      const dy = (e.clientY - cy) / (window.innerHeight / 2);
      card.style.transition = 'transform 0.1s';
      card.style.transform = `perspective(900px) rotateY(${dx * 5}deg) rotateX(${-dy * 5}deg)`;
    });
    document.addEventListener('mouseleave', () => {
      card.style.transition = 'transform 0.5s ease';
      card.style.transform = 'perspective(900px) rotateY(0deg) rotateX(0deg)';
    });
  </script>

</body>
</html>
